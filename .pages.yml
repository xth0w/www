content:
  - name: posts
    label: Posts
    path: src/content/posts
    type: collection
    fields:
      - name: title
        label: Title
        type: string
        required: true
      - name: date
        label: Date
        type: date
        required: true
      - name: description
        label: Description
        type: string
      - name: image
        label: Image
        type: image
      - name: tags
        label: Tags
        type: string
        list: true
  - name: pages
    label: Pages
    path: src/content/pages
    type: collection
    fields:
      - name: title
        label: Title
        type: string
        required: true
      - name: description
        label: Description
        type: string

media:
  - name: images
    label: Images
    path: public/images
    type: folder
